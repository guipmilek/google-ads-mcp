name: Apply mutation gate unification

on:
  push:
    branches:
      - fix/unify-mutation-gates
    paths:
      - .github/workflows/apply-gate-unification.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out gate unification branch
        uses: actions/checkout@v4
        with:
          ref: fix/unify-mutation-gates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply reviewed payload
        run: python .github/scripts/apply_gate_unification.py

      - name: Install project and formatter
        run: python -m pip install -e . black

      - name: Format changed Python sources
        run: |
          black -l 80 \
            ads_mcp/mutation_policy.py \
            ads_mcp/mutation_gateway.py \
            ads_mcp/mutation_safety.py \
            ads_mcp/tools/mutations.py \
            tests/mutation_policy_test.py \
            tests/mutation_gateway_test.py

      - name: Verify centralized gate reads
        run: |
          python - <<'PY'
          from pathlib import Path

          violations = []
          for path in Path("ads_mcp").rglob("*.py"):
              if path.name == "mutation_policy.py":
                  continue
              text = path.read_text()
              if 'os.environ.get("GOOGLE_ADS_ALLOW_' in text:
                  violations.append(str(path))
          if violations:
              raise SystemExit(
                  "Duplicate mutation gate environment reads: "
                  + ", ".join(violations)
              )
          PY

      - name: Compile sources
        run: python -m compileall -q ads_mcp tests

      - name: Run full unit test suite
        run: python -m unittest discover --buffer -s tests -p '*_test.py'

      - name: Verify formatting
        run: black --check -l 80 ads_mcp tests

      - name: Remove one-shot files
        run: |
          rm -f .github/scripts/gate-unification.part1
          rm -f .github/scripts/apply_gate_unification.py
          rm -f .github/workflows/apply-gate-unification.yml

      - name: Commit tested gate unification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix: unify mutation gate authorization"
          git push origin HEAD:fix/unify-mutation-gates
