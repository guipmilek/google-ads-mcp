name: Apply and verify AdGroupAd status endpoint

on:
  push:
    branches:
      - feat/ad-group-ad-status-endpoint
    paths:
      - .github/workflows/apply-ad-group-ad-status-endpoint.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: feat/ad-group-ad-status-endpoint
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install black nox pyfakefs "coverage==6.5.0" google-genai

      - name: Apply endpoint implementation and tests
        run: python .github/scripts/apply_ad_group_ad_status_endpoint.py

      - name: Update policy version regression expectations
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path("tests").rglob("*.py"):
              text = path.read_text(encoding="utf-8")
              updated = text.replace("mutation-safety-v4", "mutation-safety-v5")
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Refresh MCP tool golden
        run: python -m tests.smoke.generate_golden

      - name: Format repository
        run: python -m black -l 80 .

      - name: Verify formatting
        run: python -m black --check -l 80 .

      - name: Compile sources
        run: python -m compileall -q ads_mcp tests

      - name: Run focused endpoint tests
        run: |
          set +e
          python -m unittest \
            tests.ad_group_ad_status_endpoint_test \
            tests.mutation_gateway_test \
            tests.mutation_gateway_regression_test \
            tests.mutation_policy_test \
            > /tmp/focused-tests.log 2>&1
          status=$?
          cat /tmp/focused-tests.log
          echo "$status" > /tmp/focused-tests.exit
          exit 0

      - name: Upload endpoint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ad-group-ad-endpoint-diagnostics
          path: |
            /tmp/focused-tests.log
            /tmp/focused-tests.exit
            ads_mcp
            tests
            pyproject.toml
            noxfile.py
          if-no-files-found: error

      - name: Require focused tests success
        run: test "$(cat /tmp/focused-tests.exit)" = "0"

      - name: Run full unit suite
        run: |
          coverage erase
          coverage run -m unittest discover --buffer -s=tests -p '*_test.py'

      - name: Run smoke tests
        run: python -m unittest tests/smoke/smoke_test.py

      - name: Verify dedicated tool contract is exposed
        run: |
          grep -q 'mutations_update_ad_group_ad_statuses' \
            tests/smoke/golden_tools_list.json
          grep -q 'mutation_gateway.update_ad_group_ad_statuses' \
            ads_mcp/tools/mutations.py

      - name: Remove one-shot workflow files
        run: |
          rm -f .github/scripts/apply_ad_group_ad_status_endpoint.py
          rm -f .github/workflows/apply-ad-group-ad-status-endpoint.yml

      - name: Commit tested changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "feat: add atomic AdGroupAd status endpoint"
          git push origin HEAD:feat/ad-group-ad-status-endpoint
