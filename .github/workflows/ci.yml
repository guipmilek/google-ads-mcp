name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black nox
      - name: Run lint
        run: nox -s lint

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nox
      - name: Run tests
        run: nox -s tests-${{ matrix.python-version }}

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nox .
      - name: Run smoke tests
        run: nox -s smoke_tests

  llm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nox . google-genai
      - name: Run LLM tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: nox -s llm_tests

  gate-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black .
      - name: Format gate files
        run: |
          black -l 80 \
            ads_mcp/mutation_policy.py \
            ads_mcp/mutation_gateway.py \
            ads_mcp/tools/mutations.py \
            tests/mutation_policy_test.py \
            tests/mutation_gateway_test.py \
            tests/mutation_gateway_regression_test.py
      - name: Run focused tests and capture output
        continue-on-error: true
        run: |
          python -m unittest \
            tests.mutation_policy_test \
            tests.mutation_gateway_test \
            tests.mutation_gateway_regression_test \
            > gate-test-output.txt 2>&1
      - name: Run full tests and capture output
        continue-on-error: true
        run: |
          python -m unittest discover --buffer -s tests -p '*_test.py' \
            > full-test-output.txt 2>&1
      - name: Run smoke test and capture output
        continue-on-error: true
        run: |
          python -m unittest tests/smoke/smoke_test.py \
            > smoke-test-output.txt 2>&1
      - name: Generate current tools golden
        run: |
          python - <<'PY'
          import json
          from tests.smoke import smoke_utils

          result = smoke_utils.get_tools_list()
          result.get("tools", []).sort(key=lambda item: item.get("name", ""))
          with open("generated_golden_tools_list.json", "w") as handle:
              json.dump(result, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
      - name: Capture repository formatting status
        continue-on-error: true
        run: black --check --diff -l 80 . > black-output.txt 2>&1
      - name: Package diagnostics
        run: |
          tar -czf formatted-gate-files.tar.gz \
            ads_mcp/mutation_policy.py \
            ads_mcp/mutation_gateway.py \
            ads_mcp/tools/mutations.py \
            tests/mutation_policy_test.py \
            tests/mutation_gateway_test.py \
            tests/mutation_gateway_regression_test.py
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: gate-diagnostics
          path: |
            formatted-gate-files.tar.gz
            gate-test-output.txt
            full-test-output.txt
            smoke-test-output.txt
            generated_golden_tools_list.json
            black-output.txt
