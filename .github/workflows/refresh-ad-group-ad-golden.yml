name: Refresh AdGroupAd endpoint golden

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: feat/ad-group-ad-status-endpoint
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project and smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox . google-genai

      - name: Refresh MCP golden
        run: python -m tests.smoke.generate_golden

      - name: Run smoke tests
        run: python -m unittest tests/smoke/smoke_test.py

      - name: Remove one-shot workflow
        run: rm -f .github/workflows/refresh-ad-group-ad-golden.yml

      - name: Commit verified golden
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "test: refresh AdGroupAd endpoint golden"
          git push origin HEAD:feat/ad-group-ad-status-endpoint
